<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Documentation avec Mermaid</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation avec diagrammes Mermaid">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .mermaid {
      width: 800px !important;
      height: 600px !important;
      max-width: 800px !important;
      max-height: 600px !important;
    }
    .mermaid svg {
      width: 800px !important;
      height: 600px !important;
      max-width: 800px !important;
      max-height: 600px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Documentation avec Mermaid',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.mermaid) {
              mermaid.initialize({ 
                startOnLoad: true, 
                theme: 'dark',
                themeVariables: {
                  primaryColor: '#e1f5ff',
                  primaryTextColor: '#1e293b',
                  primaryBorderColor: '#0ea5e9',
                  lineColor: '#64748b',
                  secondaryColor: '#fff4e1',
                  tertiaryColor: '#fce4ec',
                  background: '#1e293b',
                  mainBkg: '#e1f5ff',
                  nodeBorder: '#0ea5e9',
                  clusterBkg: '#334155',
                  clusterBorder: '#475569',
                  titleColor: '#f8fafc',
                  edgeLabelBackground: '#1e293b',
                  actorBkg: '#e1f5ff',
                  actorBorder: '#0ea5e9',
                  actorTextColor: '#1e293b',
                  actorLineColor: '#64748b',
                  signalColor: '#64748b',
                  signalTextColor: '#f8fafc',
                  labelBoxBkgColor: '#334155',
                  labelTextColor: '#f8fafc',
                  labelTextColor: '#f8fafc',
                  loopTextColor: '#f8fafc',
                  noteBorderColor: '#475569',
                  noteBkgColor: '#334155',
                  noteTextColor: '#f8fafc',
                  activationBorderColor: '#475569',
                  activationBkgColor: '#334155',
                  sequenceNumberColor: '#f8fafc'
                },
                flowchart: {
                  useMaxWidth: false,
                  htmlLabels: true,
                  curve: 'basis'
                }
              });
              mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@1.0.0/dist/docsify-mermaid.min.js"></script>
</body>
</html>
