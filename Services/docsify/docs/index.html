<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Automatic Fraud Detection</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation MLOps complète avec diagrammes Mermaid">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/docsifyjs/docsify@master/docs/_media/icon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .mermaid {
      width: 800px;
      height: 600px;
      transition: height 0.1s, width 0.1s, max-height 0.1s, max-width 0.1s;
    }
    .mermaid svg {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
    }
    
   /* Force body horizontal scroll */
    body {
      overflow-x: auto;
    }
    
    /* Dark mode (default) */
    body {
      background-color: #1a1a2e;
      color: #eaeaea;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar {
      background-color: #16213e;
      transition: background-color 0.3s;
    }
    .sidebar-nav > ul > li > a {
      color: #eaeaea;
      transition: color 0.3s;
    }
    .mermaid .nodeLabel {
      color: #16213e!important;
    }
    .mermaid .cluster {
      color: #1e293b!important;
    }
    
    /* Light mode */
    body.light-mode {
      background-color: #ffffff;
      color: #1a1a2e;
    }
    body.light-mode .sidebar {
      background-color: #f5f5f5;
    }
    body.light-mode .sidebar-nav > ul > li > a {
      color: #1a1a2e;
    }
    
    /* Theme toggle button in header */
    .theme-toggle {
      position: fixed;
      top: 5px;
      left: 300px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.3s, left 0.3s;
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    body.close .theme-toggle {
      left: 10px;
    }
    body.light-mode .theme-toggle {
      background: rgba(0, 0, 0, 0.1);
    }
    body.light-mode .theme-toggle:hover {
      background: rgba(0, 0, 0, 0.15);
    }
    
    /* Sidebar toggle button */
    .sidebar-toggle-btn {
      position: fixed;
      top: 46px;
      left: 300px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.3s, left 0.3s;
    }
    .sidebar-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    body.close .sidebar-toggle-btn {
      left: 10px;
    }
    body.light-mode .sidebar-toggle-btn {
      background: rgba(0, 0, 0, 0.1);
    }
    body.light-mode .sidebar-toggle-btn:hover {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="light-mode">
  <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">☰</button>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
  <div id="app"></div>
  <script>
    // Theme toggle functionality
    let isDarkMode = localStorage.getItem('theme') === 'dark';
    
    // Apply saved theme on load
    document.body.classList.toggle('light-mode', !isDarkMode);
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.textContent = isDarkMode ? '🌙' : '☀️';
      themeToggle.addEventListener('click', toggleTheme);
    }
    
    // Sidebar toggle functionality
    const sidebarToggle = document.getElementById('sidebar-toggle');
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', function() {
        document.body.classList.toggle('close');
      });
    }
    
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      document.body.classList.toggle('light-mode', !isDarkMode);
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.textContent = isDarkMode ? '🌙' : '☀️';
      }
      // Reload page to apply new mermaid theme
      location.reload();
    }
    
    
    window.$docsify = {
      name: 'Automatic Fraud Detection',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      autoHeader: true,
      auto2top: true,
      mermaid: {
        theme: isDarkMode ? 'dark' : 'default',
        themeVariables: isDarkMode ? {
          primaryColor: '#1e3a5f',
          primaryTextColor: '#ffffff',
          primaryBorderColor: '#4a90d9',
          lineColor: '#8b9dc3',
          secondaryColor: '#2d4a6f',
          tertiaryColor: '#3d5a7f',
          background: '#0f172a',
          mainBkg: '#1e3a5f',
          nodeBorder: '#4a90d9',
          clusterBkg: '#1e293b',
          clusterBorder: '#334155',
          titleColor: '#f1f5f9',
          edgeLabelBackground: '#1e3a5f',
          actorBkg: '#1e3a5f',
          actorBorder: '#4a90d9',
          actorTextColor: '#ffffff',
          actorLineColor: '#8b9dc3',
          signalColor: '#8b9dc3',
          signalTextColor: '#f1f5f9',
          labelBoxBkgColor: '#1e293b',
          labelTextColor: '#f1f5f9',
          loopTextColor: '#f1f5f9',
          noteBorderColor: '#334155',
          noteBkgColor: '#1e293b',
          noteTextColor: '#f1f5f9',
          activationBorderColor: '#334155',
          activationBkgColor: '#1e293b',
          sequenceNumberColor: '#f1f5f9'
        } : {
          primaryColor: '#e1f5ff',
          primaryTextColor: '#1e293b',
          primaryBorderColor: '#0ea5e9',
          lineColor: '#64748b',
          secondaryColor: '#fff4e1',
          tertiaryColor: '#fce4ec',
          background: '#ffffff',
          mainBkg: '#e1f5ff',
          nodeBorder: '#0ea5e9',
          clusterBkg: '#f1f5f9',
          clusterBorder: '#cbd5e1',
          titleColor: '#1e293b',
          edgeLabelBackground: '#e1f5ff',
          actorBkg: '#e1f5ff',
          actorBorder: '#0ea5e9',
          actorTextColor: '#1e293b',
          actorLineColor: '#64748b',
          signalColor: '#64748b',
          signalTextColor: '#1e293b',
          labelBoxBkgColor: '#f1f5f9',
          labelTextColor: '#1e293b',
          loopTextColor: '#1e293b',
          noteBorderColor: '#cbd5e1',
          noteBkgColor: '#f1f5f9',
          noteTextColor: '#1e293b',
          activationBorderColor: '#cbd5e1',
          activationBkgColor: '#f1f5f9',
          sequenceNumberColor: '#1e293b'
        },
        flowchart: {
          useMaxWidth: false,
          htmlLabels: true,
          curve: 'basis'
        }
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // Dynamic height adjustment on zoom
            const mermaidElements = document.querySelectorAll('.mermaid');
            mermaidElements.forEach(el => {
              let scale = 1;
              let widthScale = 1;
              el.addEventListener('wheel', function(e) {
                if (e.ctrlKey || e.metaKey) {
                  e.preventDefault();
                  const delta = e.deltaY > 0 ? -0.1 : 0.1;
                  scale = Math.max(0.5, Math.min(5, scale + delta));
                  widthScale = Math.max(0.5, Math.min(3, widthScale + delta * 0.5));
                  el.style.setProperty('height', `${600 * scale}px`, 'important');
                  el.style.setProperty('width', `${800 * widthScale}px`, 'important');
                  el.style.setProperty('max-height', `${600 * scale}px`, 'important');
                  el.style.setProperty('max-width', `${800 * widthScale}px`, 'important');
                  // Center horizontal scroll
                  const content = document.querySelector('.content');
                  if (content) {
                    const scrollWidth = content.scrollWidth - content.clientWidth;
                    content.scrollLeft = scrollWidth / 2;
                  }
                  // Close sidebar when zooming
                  document.body.classList.add('close');
                  return false;                  
                }
              });
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@1.0.0/dist/docsify-mermaid.min.js"></script>
</body>
</html>
