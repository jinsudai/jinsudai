name: 1 - Ingestion - Actuals Ingestion Pipeline

on:
  workflow_dispatch:
    inputs:
      sftp_host:
        description: 'Hôte SFTP'
        required: false
      sftp_username:
        description: "Nom d'utilisateur SFTP"
        required: false
      ssh_private_key_b64:
        description: "Clé privée SSH encodée en base64"
        required: false
      db_uri:
        description: "URI de connexion PostgreSQL"
        required: false
      remote_directory:
        description: "Répertoire distant SFTP"
        required: false
        default: '/data/incoming'
      archive_directory:
        description: "Répertoire d'archive SFTP"
        required: false
        default: '/data/archived'
      passphrase:
        description: "Phrase de passe pour la clé SSH"
        required: false
      sftp_port:
        description: 'Port SFTP'
        required: false
        default: '22'
      sftp_timeout:
        description: 'Timeout SFTP'
        required: false
        default: '30'
      file_pattern:
        description: "Pattern de fichiers"
        required: false
        default: '*.csv'
      temp_local_dir:
        description: "Répertoire temporaire local"
        required: false
        default: '/tmp/sftp_temp'
      config_name:
        description: "Nom de la config (consumption, solar_production)"
        required: false
        default: 'consumption'
      use_env_config:
        description: "Utiliser la configuration depuis les variables d'environnement"
        required: false
        default: 'false'
  schedule:
    # Exécution toutes les heures
    - cron: '0 * * * *'
  push:
    branches:
      - main
    paths:
      - 'pipelines/ingestion/**'
      - 'src/ml/**'
  pull_request:
    branches:
      - main
    paths:
      - 'pipelines/ingestion/**'
      - 'src/ml/**'

jobs:
  sftp_ingestion:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run SFTP ingestion pipeline
        env:
          PREDICTIONS_POSTGRES_URI: ${{ secrets.PREDICTIONS_POSTGRES_URI }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY_B64: ${{ secrets.SFTP_PRIVATE_KEY_B64 }}
          SFTP_SSH_PRIVATE_KEY_CONTENT: ${{ secrets.SFTP_SSH_PRIVATE_KEY_CONTENT }}
          SFTP_PASSPHRASE: ${{ secrets.SFTP_PASSPHRASE }}
          SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
          SFTP_TIMEOUT: ${{ secrets.SFTP_TIMEOUT || '30' }}
          SFTP_REMOTE_DIRECTORY: ${{ secrets.SFTP_REMOTE_DIRECTORY || '/data/incoming' }}
          SFTP_ARCHIVE_DIRECTORY: ${{ secrets.SFTP_ARCHIVE_DIRECTORY || '/data/archived' }}
          SFTP_FILE_PATTERN: ${{ secrets.SFTP_FILE_PATTERN || '*.csv' }}
          SFTP_TEMP_LOCAL_DIR: ${{ secrets.SFTP_TEMP_LOCAL_DIR || '/tmp/sftp_temp' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.use_env_config }}" = "true" ]; then
            python pipelines/ingestion/sftp_ingestion_pipeline.py \
              --use_env_config \
              --config_name "${{ github.event.inputs.config_name || 'consumption' }}" \
              ${{ github.event.inputs.db_uri && format('--db_uri "{0}"', github.event.inputs.db_uri) || '' }}
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python pipelines/ingestion/sftp_ingestion_pipeline.py \
              --sftp_host "${{ github.event.inputs.sftp_host }}" \
              --sftp_username "${{ github.event.inputs.sftp_username }}" \
              --config_name "${{ github.event.inputs.config_name || 'consumption' }}" \
              --remote_directory "${{ github.event.inputs.remote_directory || '/data/incoming' }}" \
              --archive_directory "${{ github.event.inputs.archive_directory || '/data/archived' }}" \
              --sftp_port "${{ github.event.inputs.sftp_port || '22' }}" \
              --sftp_timeout "${{ github.event.inputs.sftp_timeout || '30' }}" \
              --file_pattern "${{ github.event.inputs.file_pattern || '*.csv' }}" \
              --temp_local_dir "${{ github.event.inputs.temp_local_dir || '/tmp/sftp_temp' }}" \
              ${{ github.event.inputs.ssh_private_key_b64 && format('--ssh_private_key_b64 "{0}"', github.event.inputs.ssh_private_key_b64) || '' }} \
              ${{ github.event.inputs.passphrase && format('--passphrase "{0}"', github.event.inputs.passphrase) || '' }} \
              ${{ github.event.inputs.db_uri && format('--db_uri "{0}"', github.event.inputs.db_uri) || '' }}
          else
            python pipelines/ingestion/sftp_ingestion_pipeline.py \
              --use_env_config \
              --config_name "consumption"
          fi
