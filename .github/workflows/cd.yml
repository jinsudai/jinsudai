name: 0 - CD

on:
  workflow_run:
    workflows: ["0 - CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      createSpaces: ${{ steps.filter.outputs.createSpaces }}
      pushServices: ${{ steps.filter.outputs.pushServices }}
      updateSecrets: ${{ steps.filter.outputs.updateSecrets }}
      buildFastApi: ${{ steps.filter.outputs.buildFastApi }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: >-
          ${{ github.event.workflow_run.head_sha || github.sha }}
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          createSpaces:
            - '.github/scripts/hf_create_spaces.py'
            - '.github/workflows/0_hf_create_spaces.yaml'
            - 'config.yaml'
          pushServices:
            - '.github/scripts/hf_push_services.py'
            - 'Services/**'
            - 'src/ml/config/**'
          updateSecrets:
            - '.github/scripts/hf_update_secrets.py'
            - '.github/scripts/hf_update_secrets.yaml'
            - 'config.yaml'
          buildFastApi:
            - 'Services/JinsudAPI/**'

  build-and-push-FastAPI:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: filter
    if: needs.filter.outputs.buildFastApi == 'true'

    strategy:
      matrix:
        service: [JinsudAPI]
        include:
          - service: JinsudAPI
            filter: buildFastApi

    steps:
    - uses: actions/checkout@v4

    - name: Skip if no changes for this service
      if: needs.filter.outputs[matrix.filter] != 'true'
      run: |
        echo "No changes for ${{ matrix.service }}, skipping build"
        exit 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Services/${{ matrix.service }}/Dockerfile.prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  hf-create-spaces:
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.createSpaces == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub python-dotenv

      - name: Create spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AIRFLOW_HF_TOKEN: ${{ secrets.AIRFLOW_HF_TOKEN }}
          JINSUDAPI_HF_TOKEN: ${{ secrets.JINSUDAPI_HF_TOKEN }}
          EVIDENTLYUI_HF_TOKEN: ${{ secrets.EVIDENTLYUI_HF_TOKEN }}
        run: |
          python .github/scripts/hf_create_spaces.py

  hf-push-services:
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.pushServices == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub python-dotenv

      - name: Push services to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AIRFLOW_HF_TOKEN: ${{ secrets.AIRFLOW_HF_TOKEN }}
          JINSUDAPI_HF_TOKEN: ${{ secrets.JINSUDAPI_HF_TOKEN }}
          EVIDENTLYUI_HF_TOKEN: ${{ secrets.EVIDENTLYUI_HF_TOKEN }}
        run: |
          python .github/scripts/hf_push_services.py

  hf-update-secrets:
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.updateSecrets == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub python-dotenv requests

      - name: Update secrets in spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          MLFLOW_POSTGRES_URI: ${{ secrets.MLFLOW_POSTGRES_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
          JUPYTER_TOKEN: ${{ secrets.JUPYTER_TOKEN }}
          N8N_DB_POSTGRES_URI: ${{ secrets.N8N_DB_POSTGRES_URI }}
          DB_TYPE: ${{ secrets.DB_TYPE }}
          DB_POSTGRESDB_USER: ${{ secrets.DB_POSTGRESDB_USER }}
          DB_POSTGRESDB_PASSWORD: ${{ secrets.DB_POSTGRESDB_PASSWORD }}
          DB_POSTGRESDB_HOST: ${{ secrets.DB_POSTGRESDB_HOST }}
          DB_POSTGRESDB_PORT: ${{ secrets.DB_POSTGRESDB_PORT }}
          DB_POSTGRESDB_DATABASE: ${{ secrets.DB_POSTGRESDB_DATABASE }}
          AIRFLOW_ADMIN_USER: ${{ secrets.AIRFLOW_ADMIN_USER }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${{ secrets.AIRFLOW__DATABASE__SQL_ALCHEMY_CONN }}
          AIRFLOW__WEBSERVER__SECRET_KEY: ${{ secrets.AIRFLOW__WEBSERVER__SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          AIRFLOW_HF_TOKEN: ${{ secrets.AIRFLOW_HF_TOKEN }}
          JINSUDAPI_HF_TOKEN: ${{ secrets.JINSUDAPI_HF_TOKEN }}
          EVIDENTLYUI_HF_TOKEN: ${{ secrets.EVIDENTLYUI_HF_TOKEN }}
        run: |
          python .github/scripts/hf_update_secrets.py

  deploy-FastAPI:
    runs-on: ubuntu-latest
    needs: [filter, build-and-push-FastAPI]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.filter.outputs.buildFastApi == 'true')

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to production
      run: |
        echo "Deployment step - configure based on your infrastructure"
        echo "This could include:"
        echo "- Kubernetes deployment"
        echo "- Docker Compose update"
        echo "- Cloud provider deployment"
        echo "- SSH to production server"
