name: Actual Values Pipeline

on:
  workflow_dispatch:
    inputs:
      db_uri:
        description: 'URI de connexion PostgreSQL'
        required: false
      config_name:
        description: 'Nom de la config (consumption, solar_production)'
        required: false
        default: 'consumption'
  schedule:
    # Exécution quotidienne à minuit UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'pipelines/actual_values/**'
      - 'src/ml/**'
  pull_request:
    branches:
      - main
    paths:
      - 'pipelines/actual_values/**'
      - 'src/ml/**'

jobs:
  actual_values:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run actual values pipeline
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
        run: |
          python pipelines/actual_values/actual_values_pipeline.py \
            --config_name "${{ github.event.inputs.config_name || 'consumption' }}" \
            ${{ github.event.inputs.db_uri && format('--db_uri "{0}"', github.event.inputs.db_uri) || '' }}
