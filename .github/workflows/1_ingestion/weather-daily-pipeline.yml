name: Weather Daily Pipeline

on:
  push:
    paths:
      - 'pipelines/WeatherDaily/**'
      - 'src/ml/workflows/weather_flow.py'
      - 'src/ml/connectors/weather/**'
  pull_request:
    paths:
      - 'pipelines/WeatherDaily/**'
      - 'src/ml/workflows/weather_flow.py'
      - 'src/ml/connectors/weather/**'
  workflow_dispatch:  # Permet le lancement manuel depuis l'interface GitHub

jobs:
  weather-daily-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Weather Daily Pipeline image
        run: |
          docker build -f pipelines/WeatherDaily/Dockerfile -t weather-daily-pipeline .
      
      - name: Run Weather Daily Pipeline
        env:
          # Ajoutez vos variables d'environnement nécessaires ici
          CONFIG_PATH: src/configs/consumption.yaml
          WEATHER_SOURCE_PATH: data/source/weather_raw.parquet
          WEATHER_PROD_PATH: data/processed/weather.parquet
          DAYS_AHEAD: 7
          # S3 Configuration (optionnel)
          UPLOAD_TO_S3: ${{ secrets.UPLOAD_TO_S3 || 'false' }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ secrets.S3_PREFIX || 'weather' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          ENDPOINT_URL: ${{ secrets.ENDPOINT_URL }}
        run: |
          docker run --rm \
            -e CONFIG_PATH=${{ env.CONFIG_PATH }} \
            -e WEATHER_SOURCE_PATH=${{ env.WEATHER_SOURCE_PATH }} \
            -e WEATHER_PROD_PATH=${{ env.WEATHER_PROD_PATH }} \
            -e DAYS_AHEAD=${{ env.DAYS_AHEAD }} \
            -e UPLOAD_TO_S3=${{ env.UPLOAD_TO_S3 }} \
            -e S3_BUCKET=${{ env.S3_BUCKET }} \
            -e S3_PREFIX=${{ env.S3_PREFIX }} \
            -e AWS_ACCESS_KEY_ID=${{ env.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ env.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REGION=${{ env.AWS_REGION }} \
            -e ENDPOINT_URL=${{ env.ENDPOINT_URL }} \
            weather-daily-pipeline \
            python run_pipeline.py \
            --config_path ${CONFIG_PATH:-src/configs/consumption.yaml} \
            --weather_source_path ${WEATHER_SOURCE_PATH:-data/source/weather_raw.parquet} \
            --weather_prod_path ${WEATHER_PROD_PATH:-data/processed/weather.parquet} \
            --days_ahead ${DAYS_AHEAD:-7} \
            ${UPLOAD_TO_S3:+--upload_to_s3} \
            ${S3_BUCKET:+--s3_bucket $S3_BUCKET} \
            ${S3_PREFIX:+--s3_prefix $S3_PREFIX} \
            ${AWS_ACCESS_KEY_ID:+--aws_access_key_id $AWS_ACCESS_KEY_ID} \
            ${AWS_SECRET_ACCESS_KEY:+--aws_secret_access_key $AWS_SECRET_ACCESS_KEY} \
            ${AWS_REGION:+--aws_region $AWS_REGION} \
            ${ENDPOINT_URL:+--endpoint_url $ENDPOINT_URL}
      
      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: weather-pipeline-logs
          path: |
            data/source/weather*.parquet
            data/processed/weather*.parquet
            data/temp/
          if-no-files-found: ignore
