name: 1 - CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
    
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
    
    - name: Install project
      run: poetry install --no-interaction
    
    - name: Run tests
      run: |
        poetry run pytest tests/ -v --tb=short
    
    - name: Run linting
      run: |
        poetry run pip install flake8
        poetry run flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503,E402
    
    - name: Check imports
      run: |
        poetry run python tests/test_imports.py

  validate-configs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Validate YAML configs
      run: |
        poetry run python -c "
        import yaml
        import glob
        import sys
        yaml_files = glob.glob('src/configs/*.yaml') + ['config.yaml', 'openspec/config.yaml']
        for f in yaml_files:
            try:
                with open(f) as fp:
                    yaml.safe_load(fp)
                print(f'✓ {f}')
            except Exception as e:
                print(f'✗ {f}: {e}')
                sys.exit(1)
        "
