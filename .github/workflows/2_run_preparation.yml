name: 2 - Preparation - Consumption

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Date de début (YYYY-MM-DD)'
        required: false
      end_date:
        description: 'Date de fin (YYYY-MM-DD)'
        required: false
      raw_path:
        description: 'Chemin vers le fichier brut PRM (optionnel, utilise data/templates/raw_consumption.csv par défaut)'
        required: false
      output_dir:
        description: 'Répertoire de sortie local'
        required: false
        default: 'data/processed/'
      upload_s3:
        description: 'Uploader sur S3'
        required: false
        default: 'true'
      s3_bucket:
        description: 'Nom du bucket S3 (optionnel, utilise AWS_BUCKET par défaut)'
        required: false
  # schedule:
  #   # Exécution quotidienne à 2h du matin (heure UTC)
  #   - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/2_preparation_pipeline.yml'
      - 'pipelines/run_preparation.py'
      - 'src/ml/pipelines/preparation_pipeline.py'
      - 'src/ml/consumption/**'
      - 'src/ml/utils/s3_handler.py'
      - 'src/ml/utils/data/**'
      - 'src/ml/connectors/weather/**'
      - 'src/ml/connectors/holidays/**'
      - 'src/ml/config/**'

jobs:
  prepare_consumption:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Run prepare consumption pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          PREDICTIONS_POSTGRES_URI : ${{ secrets.PREDICTIONS_POSTGRES_URI }}
        run: |
          python pipelines/run_preparation.py \
            --use_database \
            --output_dir "${{ github.event.inputs.output_dir || 'data/processed/' }}" \
            ${{ github.event.inputs.s3_bucket && format('--s3_bucket "{0}"', github.event.inputs.s3_bucket) || '' }}
      
      - name: Upload weather artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-data
          path: data/processed/*_weather.parquet
          retention-days: 1

      - name: Upload holidays artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: holidays-data
          path: data/processed/*_holidays.parquet
          retention-days: 1

      - name: Upload train artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-data
          path: data/processed/*_train.parquet
          retention-days: 1
