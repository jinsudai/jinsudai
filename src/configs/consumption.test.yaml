# Overrides pour l'environnement TEST
# Merge avec consumption.yaml (base)

data:
  raw_path: "../data/test/raw_consumption.csv"
  train_path: "../data/test/train_consumption.parquet"
  processed_path: "../data/test/"

model:
  test_size: 0.25
  time_limit: 1800  # 30 min max

training:
  epochs: 50
  batch_size: 64
  time_limit: 1800

# MLflow test
mlflow:
  experiment_name: "energy_consumption_test"
  model_name: "consumption_model_test"

# Monitoring
monitoring:
  alert_threshold: 0.85
