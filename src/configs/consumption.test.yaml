# Overrides pour l'environnement TEST
# Merge avec consumption.yaml (base)

data:
  raw_path: "data/test/test_raw_consumption.csv"
  processed_path: "data/staging/processed/consumption/"

model:
  test_size: 0.25
  time_limit: 1800  # 30 min max

training:
