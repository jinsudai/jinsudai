# Configuration - Modèle de CONSOMMATION ÉLECTRIQUE
# Voir SPECIFICATIONS.md pour les contraintes globales

# Chemins données
data:

  # Fichier brut PRM (override dans les fichiers spécifiques à l'environnement)
  raw_path: "../data/dev/raw_consumption.csv"
  processed_path: "../data/dev/"
  train_path: "../data/dev/train_consumption.parquet"
  weather_file: "../data/processed/weather.parquet"
  holidays_file: "../data/processed/holidays.parquet"
  holidays_zone: "C"  # Zone scolaire (A, B ou C)
  
  # Configuration API météo pour prévisions
  weather_latitude: 48.8566  # Paris par défaut
  weather_longitude: 2.3522
  weather_location: "Paris"

  target_column: "Valeur"  # Consommation en kWh
  
  # Features à utiliser
  feature_columns:
    - "Horodate"
    - "temperature_2m_mean"
    - "relative_humidity_mean"
    - "precipitation_sum"
    - "is_vacances"
    - "jour de la semaine"
    - "jour férié"

  
  # Colonnes à supprimer
  drop_columns:
    - "Identifiant PRM"
    - "Date de début"
    - "Date de fin"
    - "Grandeur physique"
    - "Grandeur métier"
    - "Etape métier"
    - "Unité"
    - "Nature"
    - "Pas"
    - "Indice de vraisemblance"
    - "Etat complémentaire"

# Paramètres modèle
model:
  test_size: 0.2
  random_state: 42
  model_type: "auto_gluon"
  problem_type: "regression"  # Prédiction consommation (continu)
  
# Paramètres entraînement
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  time_limit: 3600  # 1h max (voir SPECIFICATIONS.md)

# MLflow
mlflow:
  tracking_uri: "https://jinsudai-mlflow.hf.space/"
  experiment_name: "energy_consumption"
  model_name: "consumption_model"
  
# Monitoring
monitoring:
  metric_name: "r2_score"  # R² pour régression
  metric_target: 0.90  # Target 90%
  alert_threshold: 0.85  # Warning si < 85%

# SFTP Configuration pour récupération des valeurs réelles
sftp:
  enabled: true  # Activer/désactiver l'intégration SFTP
  host: "${SFTP_HOST:sftp.example.com}"
  port: 22
  username: "${SFTP_USERNAME:sftp_user}"
  ssh_private_key_content: "${SFTP_SSH_PRIVATE_KEY_CONTENT:}"  # Contenu de la clé SSH (format OpenSSH) depuis secret (requis)
  passphrase: "${SFTP_PASSPHRASE:}"  # Passphrase pour la clé SSH (optionnel)
  timeout: 30
  
  # Répertoires
  remote_directory: "${SFTP_REMOTE_DIRECTORY:/data/incoming}"  # Répertoire contenant les fichiers à traiter
  archive_directory: "${SFTP_ARCHIVE_DIRECTORY:/data/archived}"  # Répertoire pour les fichiers traités
  file_pattern: "${SFTP_FILE_PATTERN:*.csv}"  # Pattern des fichiers à traiter
  
  # Traitement local
  temp_local_dir: "${SFTP_TEMP_LOCAL_DIR:/tmp/sftp_temp}"  # Répertoire temporaire local

# Configuration des notifications par email
# Note: La configuration détaillée est dans config.yaml (section email)
email:
  enabled: true  # Activer/désactiver les notifications email pour ce module
