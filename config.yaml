# Configuration globale du projet
# Ce fichier contient les configurations partagées entre tous les modules

# Configuration des notifications email
email:
  # Type de service email: smtp ou resend
  provider: "resend"  # Options: "smtp", "resend"
  
  # Configuration SMTP (utilisé si provider = "smtp")
  smtp:
    server: "smtp.gmail.com"
    port: 587
    use_tls: true
  
  # Configuration Resend (utilisé si provider = "resend")
  resend:
    api_key: null  # Clé API Resend (à définir via variable d'environnement RESEND_API_KEY)
    from_email: "jinsudai@free.fr"  # Email expéditeur par défaut
  
  # Configuration commune
  sender_email: "jinsudai@free.fr"  # Email expéditeur (pour SMTP)
  sender_password: null  # Mot de passe (pour SMTP, à définir via variable d'environnement)
  recipient_emails:
    - "jinsudai@free.fr"

# Configuration de la base de données
database:
  uri: null  # URI PostgreSQL (à définir via variable d'environnement PREDICTIONS_POSTGRES_URI)

# Configuration MLflow
mlflow:
  tracking_uri: "https://jinsudai-mlflow.hf.space/"
  default_experiment_name: "energy_consumption"

# Configuration FastAPI
fastapi:
  url: "https://jetestai-jinsudAPI.hf.space/"
  predict_endpoint: "/predict/batch"

# Configuration SFTP
sftp:
  enabled: false
  host: "sftp.example.com"
  port: 22
  username: "sftp_user"
  ppk_key_path: "/path/to/key.ppk"
  passphrase: null
  timeout: 30
  remote_directory: "/data/incoming"
  archive_directory: "/data/archived"
  file_pattern: "*.csv"
  temp_local_dir: "/tmp/sftp_temp"

# Configuration S3
s3:
  bucket: "data-store"  # Nom du bucket S3 par défaut pour les données
  prefix: "weather"  # Préfixe par défaut pour les fichiers météo

# Configuration de l'environnement
environment: "dev"  # Options: "dev", "test", "prod"

# Configuration des services
services:
  # Liste des services internes (HuggingFace Spaces)
  names:
    - "jinsudai/MLflow"
    - "jinsudai/docsify"
    - "jinsudai/slidev"

  satellites:
    - "airflai/airflow"
    - "jetestai/JinsudAPI"
    - "evidentlai/EvidentlyUI"
    
# Logging
logging:
  level: "INFO"  # Options: "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Configuration Evidently AI
evidently:
  enabled: true  # Activer/désactiver Evidently
  ui_url: "https://jinsudai-evidentlyui.hf.space"  # URL du service Evidently UI (RemoteWorkspace)
  project_id: "019f13a4-e704-74be-a358-f53577d6bd2f"  # ID du projet existant sur Evidently UI
  workspace_path: "s3://evidently-reports/workspace"  # Chemin du workspace (utilisé par le serveur UI pour le stockage S3)
  report_path: "./evidently_reports"  # Chemin pour sauvegarder les rapports
  use_native_reports: true  # Utiliser les rapports natifs Evidently (recommandé)
  save_to_mlflow: true  # Sauvegarder les rapports dans MLflow
  mlflow_artifact_path: "evidently_reports"  # Chemin des artefacts dans MLflow
  save_to_workspace: true  # Sauvegarder dans le workspace Evidently UI via RemoteWorkspace
  save_to_s3: false  # Le serveur UI gère le stockage S3
  s3_bucket: "evidently-reports"  # Bucket S3 pour les rapports (utilisé par le serveur UI)
  s3_prefix: "evidently_reports"  # Préfixe S3 pour les rapports (utilisé par le serveur UI)
